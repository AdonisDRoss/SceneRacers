<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShadowRacers: Neo-Velo Urban Circuit</title>
    <style>
        body {
            margin: 0;
            background: #020305; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 1024px;
            height: 640px;
        }
        canvas {
            border: 3px solid #111622;
            background: #030508;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 13px;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            line-height: 1.6;
            z-index: 10;
        }
        .highlight { color: #ffffff; }
        .zone-slums { color: #ff5500; text-shadow: 0 0 5px #ff5500; }
        .zone-downtown { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
        .controls-hint {
            margin-top: 15px;
            color: #3f4e66;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="ui">
            GPS.GRID: <span id="zoneTxt" class="zone-slums">LOADING...</span><br>
            COORDS: X:<span id="coordX" class="highlight">0</span> Y:<span id="coordY" class="highlight">0</span><br>
            HEADING: <span id="headingTxt" class="highlight">0</span>/255<br>
            VELOCITY: <span id="speedTxt" class="highlight">0</span> KN/H<br>
            LAP.RECORDS: <span id="lapTxt" class="highlight">1</span>
        </div>
        <canvas id="gameCanvas" width="1024" height="640"></canvas>
    </div>
    <div class="controls-hint">STEER: WASD/ARROWS • BOOST: SPACEBAR • EXPLORE THE MEGACITY MAP</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const zoneTxt = document.getElementById("zoneTxt");
        const coordX = document.getElementById("coordX");
        const coordY = document.getElementById("coordY");
        const headingTxt = document.getElementById("headingTxt");
        const speedTxt = document.getElementById("speedTxt");
        const lapTxt = document.getElementById("lapTxt");

        // Preloaded Spectre-X1 Sprite Base
        const craftSprite = new Image();
        craftSprite.src = "https://images.gmanetwork.com/news/images/2021/04/cyber_1_20210423160249.jpg"; 

        const inputs = { forward: false, backward: false, left: false, right: false, boost: false };

        window.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            if (k === "arrowup" || k === "w") inputs.forward = true;
            if (k === "arrowdown" || k === "s") inputs.backward = true;
            if (k === "arrowleft" || k === "a") inputs.left = true;
            if (k === "arrowright" || k === "d") inputs.right = true;
            if (k === " ") inputs.boost = true;
        });

        window.addEventListener("keyup", e => {
            const k = e.key.toLowerCase();
            if (k === "arrowup" || k === "w") inputs.forward = false;
            if (k === "arrowdown" || k === "s") inputs.backward = false;
            if (k === "arrowleft" || k === "a" || k === "arrowright" || k === "d") { inputs.left = false; inputs.right = false; }
            if (k === " ") inputs.boost = false;
        });

        let lap = 1;
        let checkpointPassed = false;
        let headingByte = 0; 

        // Car size shrunk down significantly to make the environment look gargantuan
        const craft = {
            x: 200, y: 200,
            width: 30, height: 15, 
            vx: 0, vy: 0, speed: 0,
            baseMaxSpeed: 9, maxSpeed: 9,
            accel: 0.22, friction: 0.95, turnByteSpeed: 5
        };

        const camera = { x: craft.x, y: craft.y, zoom: 1.0, targetZoom: 1.0, lerpSpeed: 0.07 };

        // --- ENORMOUS SECTOR-BASED MAP DESIGN ($4000 \times 4000$ SPACE) ---
        const trackPoints = [
            // ZONE A: THE UNDERCITY SLUMS (Tight, claustrophobic corridors)
            { x: 200,  y: 200 },   // Starting Grid
            { x: 1200, y: 200 },   // The Pipe Straightaway
            { x: 1200, y: 800 },   // Sewer Chicane Corner Entry
            { x: 600,  y: 800 },   // Waste Processing S-Curve
            { x: 600,  y: 1400 },  // Lower Slums Drop
            { x: 1500, y: 1400 },  // Factory Outlet Escape Road
            
            // CONDUIT TRANSITION ZONE
            { x: 2000, y: 2000 },  // Mega Sky-Bridge Ascent Ramp
            
            // ZONE B: DOWNTOWN CORPORATE HIGH-RISE (Massive open avenues)
            { x: 2000, y: 3200 },  // Neon Boulevard Main Straight
            { x: 3500, y: 3200 },  // Corporate Plaza Gateway
            { x: 3500, y: 1200 },  // Upper Tier Fast Sweeper
            { x: 2600, y: 600 },   // Skyscraper Roof Transit Link
            { x: 2600, y: -400 },  // North Highway Loop
            { x: -300, y: -400 },  // West Ring Express Lane
            { x: -300, y: 200 }    // Lowering back into Slums Sector Gate
        ];
        
        // Dynamic roadway widths depending on sector zones
        function getTrackWidthAtSegment(idx) {
            // Segments 7 to 12 map out the Downtown Area 
            if (idx >= 7 && idx <= 12) return 140; // Wide multi-lane freeway
            return 75; // Narrow, packed concrete slum paths
        }

        function update() {
            craft.maxSpeed = craft.baseMaxSpeed;
            if (inputs.boost && inputs.forward) craft.maxSpeed = 15;

            if (inputs.forward) {
                craft.speed = Math.min(craft.maxSpeed, craft.speed + craft.accel);
            } else if (inputs.backward) {
                craft.speed = Math.max(-craft.maxSpeed / 2, craft.speed - craft.accel);
            } else {
                craft.speed *= 0.94;
            }

            if (inputs.left)  headingByte = (headingByte - craft.turnByteSpeed + 256) % 256;
            if (inputs.right) headingByte = (headingByte + craft.turnByteSpeed) % 256;

            let radiansHeading = (headingByte / 256) * (Math.PI * 2);

            craft.vx += Math.cos(radiansHeading) * craft.speed * 0.15;
            craft.vy += Math.sin(radiansHeading) * craft.speed * 0.15;
            craft.vx *= craft.friction;
            craft.vy *= craft.friction;

            craft.x += craft.vx;
            craft.y += craft.vy;

            // Terrain verification map logic
            let currentTrackProfile = checkTrackCollisions(craft.x, craft.y);
            craft.baseMaxSpeed = (!currentTrackProfile.onTrack) ? 3.0 : 9.5;

            // Display zone tag adjustments based on current map position coordinates
            if (craft.y > 1700) {
                zoneTxt.innerText = "DOWNTOWN SECTOR (HIGH-RISE)";
                zoneTxt.className = "zone-downtown";
            } else {
                zoneTxt.innerText = "UNDERCITY SECTOR (SLUMS)";
                zoneTxt.className = "zone-slums";
            }

            // Lap tracking validation marks
            if (craft.x > 1900 && craft.y > 1900 && craft.y < 2100) checkpointPassed = true;
            if (checkpointPassed && craft.x > 150 && craft.x < 250 && craft.y > 150 && craft.y < 250) {
                lap++; checkpointPassed = false; lapTxt.innerText = lap;
            }

            // Camera adjustments based on velocity shifts
            let currentVelocityMagnitude = Math.sqrt(craft.vx * craft.vx + craft.vy * craft.vy);
            camera.targetZoom = 1.0 - Math.min(0.4, currentVelocityMagnitude * 0.035);

            camera.zoom += (camera.targetZoom - camera.zoom) * camera.lerpSpeed;
            camera.x += (craft.x - camera.x) * camera.lerpSpeed;
            camera.y += (craft.y - camera.y) * camera.lerpSpeed;

            // HUD data streams
            coordX.innerText = Math.round(craft.x);
            coordY.innerText = Math.round(craft.y);
            headingTxt.innerText = headingByte;
            speedTxt.innerText = Math.round(currentVelocityMagnitude * 42);

            draw();
            requestAnimationFrame(update);
        }

        // Variable track-width geometric boundary scanner
        function checkTrackCollisions(x, y) {
            let minDistance = Infinity;
            let activeSegmentWidth = 80;
            for (let i = 0; i < trackPoints.length; i++) {
                let p1 = trackPoints[i];
                let p2 = trackPoints[(i + 1) % trackPoints.length];
                let dist = distToSegment({x: x, y: y}, p1, p2);
                if (dist < minDistance) {
                    minDistance = dist;
                    activeSegmentWidth = getTrackWidthAtSegment(i);
                }
            }
            return { onTrack: minDistance < activeSegmentWidth };
        }

        function distToSegment(p, v, w) {
            let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
            if (l2 == 0) return Math.sqrt(Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2));
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.sqrt(Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            // Infinite Parallax Matrix Background Lines
            ctx.strokeStyle = "#080d1a"; ctx.lineWidth = 1;
            let gridSize = 120;
            let startGridX = Math.floor((camera.x - canvas.width * 2) / gridSize) * gridSize;
            let startGridY = Math.floor((camera.y - canvas.height * 2) / gridSize) * gridSize;
            for(let x = startGridX; x < startGridX + (canvas.width * 4); x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, camera.y - canvas.height*2); ctx.lineTo(x, camera.y + canvas.height*2); ctx.stroke();
            }
            for(let y = startGridY; y < startGridY + (canvas.height * 4); y += gridSize) {
                ctx.beginPath(); ctx.moveTo(camera.x - canvas.width*2, y); ctx.lineTo(camera.x + canvas.width*2, y); ctx.stroke();
            }

            // FIRST ENVIRONMENT RENDERING PASS: Dynamic roadway segments
            trackPoints.forEach((p, idx) => {
                let nextP = trackPoints[(idx + 1) % trackPoints.length];
                let currentWidth = getTrackWidthAtSegment(idx);

                // Asphalt Base Layer
                ctx.strokeStyle = (idx >= 7 && idx <= 12) ? "#0f131c" : "#090a0f"; 
                ctx.lineWidth = currentWidth * 2;
                ctx.lineCap = "round"; ctx.lineJoin = "round";
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(nextP.x, nextP.y); ctx.stroke();

                // Distinct sector edge illumination lines
                ctx.strokeStyle = (idx >= 7 && idx <= 12) ? "#00ffff" : "#ff5500"; 
                ctx.lineWidth = 3;
                ctx.stroke();
            });

            // FINISH LINE ARRAYS
            ctx.strokeStyle = "#e60067"; ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(200, 200 - 75); ctx.lineTo(200, 200 + 75); ctx.stroke();

            // SYSTEM VEHICLE RENDER PIPELINE
            let radiansHeading = (headingByte / 256) * (Math.PI * 2);

            // Overhead Drop Shadow Vector
            ctx.save();
            ctx.translate(craft.x + 6, craft.y + 10); 
            ctx.rotate(radiansHeading);
            ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
            ctx.fillRect(-craft.width / 2, -craft.height / 2, craft.width, craft.height);
            ctx.restore();

            // Core Chassis Drawing Pass
            ctx.save();
            ctx.translate(craft.x, craft.y);
            ctx.rotate(radiansHeading);

            if (craftSprite.complete && craftSprite.naturalWidth !== 0) {
                ctx.drawImage(craftSprite, -craft.width/2, -craft.height/2, craft.width, craft.height);
            } else {
                ctx.fillStyle = "#121929"; ctx.fillRect(-craft.width/2, -craft.height/2, craft.width, craft.height);
            }

            // Input Delta Layer Checks
            if (inputs.backward || craft.speed === 0) {
                ctx.fillStyle = "#ff0044";
                ctx.fillRect(-craft.width/2, -craft.height/2, 2, 3);
                ctx.fillRect(-craft.width/2, craft.height/2 - 3, 2, 3);
            }
            if (inputs.forward) {
                ctx.fillStyle = (inputs.boost) ? "#e60067" : "#00ffcc";
                let flameSize = (inputs.boost) ? 18 : 8;
                ctx.beginPath(); ctx.moveTo(-craft.width/2, -craft.height/4); ctx.lineTo(-craft.width/2 - flameSize, 0); ctx.lineTo(-craft.width/2, craft.height/4); ctx.closePath(); ctx.fill();
            }

            ctx.restore();
            ctx.restore(); 
        }

        update();
    </script>
</body>
</html>
